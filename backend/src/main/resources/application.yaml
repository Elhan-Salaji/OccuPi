server:
  port: 8080

spring:
  application:
    name: occupi
  profiles:
    active: dev
  docker:
    compose:
      enabled: false
  # No form-login / default in-memory user — auth is delegated to Keycloak (prod).
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/occupi}
    username: ${POSTGRES_USER:occupi}
    password: ${POSTGRES_PASSWORD:occupi}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

influxdb:
  url: http://localhost:8181
  database: occupi
  token: ""

# "Latest per room / per sensor" reads only scan this many days back, so the
# InfluxDB window-function query never walks the full measurement history. An
# unbounded scan pinned the single-core server CPU and crashed it once a large
# amount of data had accumulated (#273).
occupancy:
  latest-lookback-days: 7
metrics:
  latest-lookback-days: 7

logging:
  level:
    com.occupi: DEBUG
