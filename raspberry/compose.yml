# ─────────────────────────────────────────────────────────────────────────────
# OccuPi — Raspberry Pi sender
#
# Runs ON the Raspberry Pi (this is NOT part of the server stack in /docker).
# Reads the mmWave sensor — or generates realistic mock data — and streams
# occupancy to the backend over STOMP/WebSocket.
#
#   Start (one sensor):  docker compose up -d --build
#   Two sensors:         docker compose --profile second-sensor up -d --build
#   Logs:                docker compose logs -f
#
# Configure via .env (copy from .env.example). Flip mock/real with SENSOR_MODE,
# set the room with ROOM_ID_01. sensor-01 maps the radar's USB devices (below), so
# it expects the sensor attached; for hardware-free mock use run.sh (see README).
# ─────────────────────────────────────────────────────────────────────────────

# Shared config for every sensor container (one container per sensor).
x-sensor-base: &sensor-base
  build: .
  image: occupi-pi-sender:local
  env_file:
    - path: .env
      required: false        # mock runs on the config defaults even without a .env
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

services:
  sensor-01:
    <<: *sensor-base
    container_name: occupi-sensor-01
    environment:
      SENSOR_ID: sensor-01
      ROOM_ID: ${ROOM_ID_01:-room-01}
      SERIAL_CFG_PORT: /dev/ttyUSB0
      SERIAL_DATA_PORT: /dev/ttyUSB1
    # The radar's two USB serial devices (TI IWR6843 via the onboard Silicon Labs
    # CP2105 dual UART), mapped by their stable by-id paths — if00 = config/CLI
    # (115200), if01 = data (921600) — plus the dialout group the non-root container
    # needs to open them. Real mode reads these; mock ignores them. Paths from:
    #   ls -l /dev/serial/by-id/
    devices:
      - "/dev/serial/by-id/usb-Silicon_Labs_CP2105_Dual_USB_to_UART_Bridge_Controller_010BCEBF-if00-port0:/dev/ttyUSB0"
      - "/dev/serial/by-id/usb-Silicon_Labs_CP2105_Dual_USB_to_UART_Bridge_Controller_010BCEBF-if01-port0:/dev/ttyUSB1"
    group_add:
      - dialout

  # Second sensor — opt-in. Start with:
  #   docker compose --profile second-sensor up -d --build
  sensor-02:
    <<: *sensor-base
    container_name: occupi-sensor-02
    profiles: ["second-sensor"]
    environment:
      SENSOR_ID: sensor-02
      ROOM_ID: ${ROOM_ID_02:-room-02}
      # SERIAL_CFG_PORT: /dev/ttyUSB0
      # SERIAL_DATA_PORT: /dev/ttyUSB1
    # devices:
    #   - "/dev/serial/by-id/usb-...-if00:/dev/ttyUSB0"
    #   - "/dev/serial/by-id/usb-...-if01:/dev/ttyUSB1"
    # group_add:
    #   - dialout
