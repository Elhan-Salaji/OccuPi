# Frontend SPA: serve hashed static assets, fall back to index.html so that
# client-side (react-router) routes like /dashboard resolve on direct hit/reload.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
